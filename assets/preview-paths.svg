<svg width="900" height="480" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f0f20;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="profitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ff88"/>
    </marker>
    <marker id="arrowWhite" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffffff40"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="900" y2="80" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="320" x2="900" y2="320" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="400" x2="900" y2="400" stroke="#ffffff" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="480" stroke="#ffffff" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="480" stroke="#ffffff" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="480" stroke="#ffffff" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="480" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Header -->
  <text x="40" y="46" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#00ff88" filter="url(#glow)">RIFT</text>
  <text x="100" y="46" font-family="'Courier New', monospace" font-size="14" fill="#ffffff60">/ arbitrage path scanner</text>
  <text x="820" y="46" font-family="'Courier New', monospace" font-size="11" fill="#ffffff40" text-anchor="end">LIVE</text>
  <circle cx="830" cy="41" r="4" fill="#00ff88" filter="url(#glow)"/>

  <!-- Top divider -->
  <line x1="40" y1="60" x2="860" y2="60" stroke="#ffffff15" stroke-width="1"/>

  <!-- === ARBITRAGE PATH DIAGRAM === -->
  <!-- Path label -->
  <text x="40" y="95" font-family="'Courier New', monospace" font-size="11" fill="#ffffff40" letter-spacing="2">ARB PATH  •  SOL/USDC</text>

  <!-- Profit banner -->
  <rect x="40" y="105" width="820" height="34" rx="4" fill="url(#profitGrad)" stroke="#00ff8830" stroke-width="1"/>
  <text x="60" y="127" font-family="'Courier New', monospace" font-size="13" fill="#00ff88">NET PROFIT</text>
  <text x="180" y="127" font-family="'Courier New', monospace" font-size="13" fill="#ffffff">$127.40</text>
  <text x="400" y="127" font-family="'Courier New', monospace" font-size="13" fill="#ffffff60">SPREAD</text>
  <text x="480" y="127" font-family="'Courier New', monospace" font-size="13" fill="#ffffff">1.27%</text>
  <text x="660" y="127" font-family="'Courier New', monospace" font-size="13" fill="#ffffff60">WINDOW</text>
  <text x="740" y="127" font-family="'Courier New', monospace" font-size="13" fill="#ffffff">2000ms</text>

  <!-- === TOKEN NODES === -->
  <!-- Node 1: SOL (start) -->
  <circle cx="110" cy="230" r="48" fill="#1a1a2e" stroke="#9945ff" stroke-width="2" filter="url(#softglow)"/>
  <circle cx="110" cy="230" r="44" fill="#1a1a2e" stroke="#9945ff40" stroke-width="1"/>
  <text x="110" y="223" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#9945ff" text-anchor="middle" filter="url(#softglow)">SOL</text>
  <text x="110" y="242" font-family="'Courier New', monospace" font-size="10" fill="#ffffff60" text-anchor="middle">$184.20</text>

  <!-- Node 2: DEX A (Orca) -->
  <rect x="250" y="190" width="110" height="80" rx="8" fill="#0a1628" stroke="#00aaff" stroke-width="2"/>
  <text x="305" y="222" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#00aaff" text-anchor="middle">ORCA</text>
  <text x="305" y="240" font-family="'Courier New', monospace" font-size="10" fill="#ffffff60" text-anchor="middle">sell SOL</text>
  <text x="305" y="257" font-family="'Courier New', monospace" font-size="11" fill="#ffffff80" text-anchor="middle">$184.20</text>

  <!-- Node 3: USDC (middle) -->
  <circle cx="500" cy="230" r="48" fill="#1a1a2e" stroke="#2775ca" stroke-width="2" filter="url(#softglow)"/>
  <circle cx="500" cy="230" r="44" fill="#1a1a2e" stroke="#2775ca40" stroke-width="1"/>
  <text x="500" y="223" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#2775ca" text-anchor="middle" filter="url(#softglow)">USDC</text>
  <text x="500" y="242" font-family="'Courier New', monospace" font-size="10" fill="#ffffff60" text-anchor="middle">$10,000</text>

  <!-- Node 4: DEX B (Raydium) -->
  <rect x="590" y="190" width="110" height="80" rx="8" fill="#0a1628" stroke="#e040a0" stroke-width="2"/>
  <text x="645" y="222" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#e040a0" text-anchor="middle">RAYDIUM</text>
  <text x="645" y="240" font-family="'Courier New', monospace" font-size="10" fill="#ffffff60" text-anchor="middle">buy SOL</text>
  <text x="645" y="257" font-family="'Courier New', monospace" font-size="11" fill="#ffffff80" text-anchor="middle">$186.54</text>

  <!-- Node 5: SOL (profit) -->
  <circle cx="790" cy="230" r="48" fill="#0a2010" stroke="#00ff88" stroke-width="2" filter="url(#glow)"/>
  <circle cx="790" cy="230" r="44" fill="#0a2010" stroke="#00ff8840" stroke-width="1"/>
  <text x="790" y="223" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#00ff88" text-anchor="middle" filter="url(#glow)">SOL</text>
  <text x="790" y="242" font-family="'Courier New', monospace" font-size="10" fill="#00ff88" text-anchor="middle">+$127.40</text>

  <!-- Arrows between nodes -->
  <!-- SOL → Orca -->
  <line x1="158" y1="230" x2="248" y2="230" stroke="#9945ff" stroke-width="2" marker-end="url(#arrowGreen)" opacity="0.8"/>
  <!-- Orca → USDC -->
  <line x1="360" y1="230" x2="450" y2="230" stroke="#00aaff" stroke-width="2" marker-end="url(#arrowGreen)" opacity="0.8"/>
  <!-- USDC → Raydium -->
  <line x1="548" y1="230" x2="588" y2="230" stroke="#2775ca" stroke-width="2" marker-end="url(#arrowGreen)" opacity="0.8"/>
  <!-- Raydium → SOL profit -->
  <line x1="700" y1="230" x2="740" y2="230" stroke="#00ff88" stroke-width="2.5" marker-end="url(#arrowGreen)" filter="url(#glow)"/>

  <!-- Step labels under arrows -->
  <text x="203" y="220" font-family="'Courier New', monospace" font-size="9" fill="#ffffff30" text-anchor="middle">STEP 1</text>
  <text x="405" y="220" font-family="'Courier New', monospace" font-size="9" fill="#ffffff30" text-anchor="middle">STEP 2</text>
  <text x="568" y="220" font-family="'Courier New', monospace" font-size="9" fill="#ffffff30" text-anchor="middle">STEP 3</text>
  <text x="720" y="220" font-family="'Courier New', monospace" font-size="9" fill="#00ff8860" text-anchor="middle">PROFIT</text>

  <!-- Bottom stats row -->
  <line x1="40" y1="310" x2="860" y2="310" stroke="#ffffff10" stroke-width="1"/>

  <text x="40" y="345" font-family="'Courier New', monospace" font-size="11" fill="#ffffff30">CONFIDENCE</text>
  <text x="40" y="365" font-family="'Courier New', monospace" font-size="15" font-weight="bold" fill="#ffffff">82%</text>
  <rect x="40" y="374" width="82" height="4" rx="2" fill="#ffffff20"/>
  <rect x="40" y="374" width="67" height="4" rx="2" fill="#00ff88" filter="url(#softglow)"/>

  <text x="200" y="345" font-family="'Courier New', monospace" font-size="11" fill="#ffffff30">GAS COST</text>
  <text x="200" y="365" font-family="'Courier New', monospace" font-size="15" font-weight="bold" fill="#ffffff">$0.05</text>

  <text x="360" y="345" font-family="'Courier New', monospace" font-size="11" fill="#ffffff30">TRADE SIZE</text>
  <text x="360" y="365" font-family="'Courier New', monospace" font-size="15" font-weight="bold" fill="#ffffff">$10,000</text>

  <text x="520" y="345" font-family="'Courier New', monospace" font-size="11" fill="#ffffff30">TYPE</text>
  <text x="520" y="365" font-family="'Courier New', monospace" font-size="15" font-weight="bold" fill="#ffffff">CROSS-DEX ARB</text>

  <text x="740" y="345" font-family="'Courier New', monospace" font-size="11" fill="#ffffff30">ROI</text>
  <text x="740" y="365" font-family="'Courier New', monospace" font-size="15" font-weight="bold" fill="#00ff88" filter="url(#softglow)">+1.27%</text>

  <!-- Bottom footer -->
  <line x1="40" y1="415" x2="860" y2="415" stroke="#ffffff10" stroke-width="1"/>
  <text x="40" y="440" font-family="'Courier New', monospace" font-size="10" fill="#ffffff25">RIFT  •  ON-CHAIN MEV SCANNER  •  SOLANA</text>
  <text x="860" y="440" font-family="'Courier New', monospace" font-size="10" fill="#ffffff25" text-anchor="end">POWERED BY CLAUDE</text>
</svg>
